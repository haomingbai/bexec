name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  high-stress:
    name: High stress (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    env:
      BEXEC_STRESS_MULTIPLIER: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DBEXEC_BUILD_EXAMPLES=OFF

      - name: Build feature tests and header checks
        run: cmake --build build --target bexec_tests --parallel 2

      - name: Run complete test suite
        run: ctest --test-dir build --output-on-failure --parallel 2

      - name: Repeat high-stress tests
        run: >
          ctest --test-dir build
          --label-regex stress
          --repeat until-fail:3
          --output-on-failure
          --parallel 2

  coverage:
    name: Coverage report (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure coverage build
        run: >
          cmake -S . -B build-coverage
          -DCMAKE_BUILD_TYPE=Debug
          -DBEXEC_BUILD_EXAMPLES=OFF
          -DCMAKE_CXX_FLAGS="--coverage -O0 -g"
          -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build feature tests and header checks
        run: cmake --build build-coverage --target bexec_tests --parallel 2

      - name: Run tests for coverage
        run: ctest --test-dir build-coverage --output-on-failure --parallel 2

      - name: Generate coverage summary
        run: >
          python3 scripts/coverage_summary.py
          --build-dir build-coverage
          --source-root include/bexec
          --output-dir coverage

      - name: Add coverage to job summary
        run: cat coverage/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: linux-gcc-coverage
          path: coverage/
          if-no-files-found: error
          retention-days: 14

  package:
    name: Test native packages
    if: github.event_name == 'push'
    needs:
      - high-stress
      - coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install RPM packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes rpm

      - name: Select package version
        id: package-version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ ! "${version}" =~ ^[0-9]+(\.[0-9]+){2,3}$ ]]; then
              echo "Release tags must use vMAJOR.MINOR.PATCH[.TWEAK]." >&2
              exit 1
            fi
            echo "cmake-argument=-DBEXEC_VERSION=${version}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Configure package build
        run: >
          cmake -S . -B build/package
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_LIBDIR=lib
          -DBEXEC_BUILD_TESTS=OFF
          -DBEXEC_BUILD_EXAMPLES=OFF
          ${{ steps.package-version.outputs.cmake-argument }}

      - name: Build source-based consumer
        run: |
          cmake -S tests/packaging/source -B build/consumer-source \
            -DBEXEC_SOURCE_DIR="${GITHUB_WORKSPACE}"
          cmake --build build/consumer-source --parallel 2
          ctest --test-dir build/consumer-source --output-on-failure

      - name: Install to staging prefix
        run: cmake --install build/package --prefix "${RUNNER_TEMP}/bexec"

      - name: Build installed CMake consumer
        run: |
          cmake -S tests/packaging/cmake -B build/consumer-cmake \
            -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/bexec"
          cmake --build build/consumer-cmake --parallel 2
          ctest --test-dir build/consumer-cmake --output-on-failure

      - name: Build installed pkg-config consumer
        env:
          PKG_CONFIG_PATH: ${{ runner.temp }}/bexec/lib/pkgconfig
        run: |
          cmake -S tests/packaging/pkgconfig -B build/consumer-pkgconfig
          cmake --build build/consumer-pkgconfig --parallel 2
          ctest --test-dir build/consumer-pkgconfig --output-on-failure

      - name: Build DEB and RPM packages
        run: |
          cpack --config build/package/CPackConfig.cmake -G DEB
          cpack --config build/package/CPackConfig.cmake -G RPM

      - name: Inspect package contents
        run: |
          dpkg-deb --info build/package/packages/*.deb
          dpkg-deb --contents build/package/packages/*.deb
          rpm --query --package --info build/package/packages/*.rpm
          rpm --query --package --list build/package/packages/*.rpm

      - name: Generate checksums
        working-directory: build/package/packages
        run: sha256sum *.deb *.rpm > SHA256SUMS

      - name: Upload native packages
        uses: actions/upload-artifact@v4
        with:
          name: bexec-native-packages
          path: |
            build/package/packages/*.deb
            build/package/packages/*.rpm
            build/package/packages/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    if: >-
      github.event_name == 'push' &&
      github.ref_type == 'tag' &&
      startsWith(github.ref_name, 'v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download native packages
        uses: actions/download-artifact@v5
        with:
          name: bexec-native-packages
          path: packages

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}" packages/*
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --generate-notes
          --title "bexec ${GITHUB_REF_NAME}"
